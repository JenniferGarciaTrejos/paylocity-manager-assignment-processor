<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager Assignment Processor</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  @keyframes orbit {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #000000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #ffffff;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(120, 0, 200, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(160, 32, 240, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(80, 0, 160, 0.05) 0%, transparent 50%);
    animation: orbit 60s linear infinite;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(120, 0, 200, 0.015) 2px,
      rgba(120, 0, 200, 0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  .card {
    background: rgba(8, 8, 12, 0.85);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-radius: 20px;
    border: 1px solid rgba(120, 40, 200, 0.12);
    padding: 48px;
    width: 100%;
    max-width: 680px;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -1px;
    left: -1px;
    right: -1px;
    bottom: -1px;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(160, 32, 240, 0.2) 0%, transparent 40%, transparent 60%, rgba(120, 0, 200, 0.15) 100%);
    z-index: -1;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    -webkit-mask-composite: xor;
    padding: 1px;
  }

  .card::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(160, 32, 240, 0.03), transparent);
    animation: scanline 8s ease-in-out infinite;
    pointer-events: none;
  }

  .card-glow {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: -1;
  }

  .card-glow.top-left {
    top: -120px;
    left: -100px;
    background: rgba(140, 30, 220, 0.12);
    animation: pulse-glow 6s ease-in-out infinite;
  }

  .card-glow.bottom-right {
    bottom: -120px;
    right: -100px;
    background: rgba(100, 0, 180, 0.08);
    animation: pulse-glow 6s ease-in-out infinite 3s;
  }

  h1 {
    font-size: 1.85rem;
    font-weight: 800;
    color: #ffffff;
    margin-bottom: 8px;
    letter-spacing: -0.03em;
    position: relative;
    z-index: 1;
  }

  h1 .accent {
    background: linear-gradient(135deg, #c084fc, #a855f7, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 0.88rem;
    color: #6b6b7b;
    margin-bottom: 36px;
    line-height: 1.6;
    position: relative;
    z-index: 1;
  }

  #drop-zone {
    border: 1px solid rgba(120, 40, 200, 0.15);
    border-radius: 16px;
    padding: 56px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    background: rgba(12, 8, 20, 0.6);
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  #drop-zone::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 16px;
    background: conic-gradient(
      from 0deg,
      transparent,
      rgba(160, 32, 240, 0.15),
      transparent,
      rgba(120, 0, 200, 0.1),
      transparent
    );
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    -webkit-mask-composite: xor;
    padding: 1px;
  }

  #drop-zone::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 200px;
    height: 200px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(140, 30, 220, 0.06) 0%, transparent 70%);
    pointer-events: none;
    transition: all 0.4s ease;
  }

  #drop-zone:hover {
    border-color: rgba(160, 32, 240, 0.3);
    background: rgba(18, 10, 30, 0.7);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(120, 0, 200, 0.1);
  }

  #drop-zone:hover::before { opacity: 1; }

  #drop-zone:hover::after {
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(140, 30, 220, 0.1) 0%, transparent 70%);
  }

  #drop-zone.dragover {
    border-color: rgba(160, 32, 240, 0.5);
    background: rgba(25, 12, 40, 0.8);
    box-shadow:
      0 0 30px rgba(120, 0, 200, 0.15),
      inset 0 0 30px rgba(120, 0, 200, 0.05);
  }

  #drop-zone.dragover::before {
    opacity: 1;
    animation: orbit 4s linear infinite;
  }

  #drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
    z-index: 2;
  }

  .drop-icon {
    font-size: 2.2rem;
    margin-bottom: 16px;
    animation: float 4s ease-in-out infinite;
    position: relative;
    z-index: 1;
  }

  .drop-label {
    font-size: 1rem;
    font-weight: 600;
    color: #d4d4e0;
    letter-spacing: -0.01em;
    position: relative;
    z-index: 1;
  }

  .drop-hint {
    font-size: 0.78rem;
    color: #505060;
    margin-top: 10px;
    position: relative;
    z-index: 1;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }

  #status-area { margin-top: 28px; display: none; position: relative; z-index: 1; }

  .status-msg {
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 0.86rem;
    font-weight: 500;
    line-height: 1.5;
    backdrop-filter: blur(10px);
  }

  .status-processing {
    background: rgba(80, 60, 10, 0.15);
    color: #e0b830;
    border: 1px solid rgba(200, 160, 30, 0.2);
  }

  .status-success {
    background: rgba(10, 80, 30, 0.15);
    color: #4ade80;
    border: 1px solid rgba(74, 222, 128, 0.2);
  }

  .status-warning {
    background: rgba(80, 40, 10, 0.15);
    color: #fb923c;
    border: 1px solid rgba(251, 146, 60, 0.2);
  }

  #error-panel {
    margin-top: 24px;
    background: rgba(60, 10, 10, 0.15);
    border: 1px solid rgba(248, 113, 113, 0.15);
    border-radius: 12px;
    padding: 18px 20px;
    display: none;
    backdrop-filter: blur(10px);
    position: relative;
    z-index: 1;
  }

  #error-panel h3 {
    color: #f87171;
    font-size: 0.88rem;
    font-weight: 600;
    margin-bottom: 12px;
  }

  #error-list { list-style: none; }

  #error-list li {
    font-size: 0.8rem;
    color: #e8a0a0;
    padding: 6px 0;
    border-bottom: 1px solid rgba(248, 113, 113, 0.08);
    line-height: 1.5;
  }

  #error-list li:last-child { border-bottom: none; }

  #results-panel {
    margin-top: 24px;
    display: none;
    position: relative;
    z-index: 1;
  }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 0.88rem;
    margin-bottom: 8px;
    background: rgba(15, 12, 22, 0.6);
    border: 1px solid rgba(120, 40, 200, 0.1);
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }

  .result-row:hover {
    background: rgba(20, 15, 30, 0.7);
    border-color: rgba(120, 40, 200, 0.2);
    transform: translateX(4px);
  }

  .result-row .label { color: #9090a0; font-weight: 500; }

  .result-row .count {
    color: #c084fc;
    font-weight: 700;
    font-size: 1.1rem;
    text-shadow: 0 0 20px rgba(192, 132, 252, 0.3);
  }

  .result-row.skipped { border-color: rgba(200, 160, 30, 0.1); }
  .result-row.skipped .count { color: #e0b830; text-shadow: 0 0 20px rgba(224, 184, 48, 0.2); }

  #reset-btn {
    margin-top: 24px;
    width: 100%;
    padding: 14px;
    background: transparent;
    color: #b0b0c0;
    border: 1px solid rgba(120, 40, 200, 0.15);
    border-radius: 12px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: none;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  #reset-btn:hover {
    background: rgba(120, 40, 200, 0.08);
    border-color: rgba(160, 32, 240, 0.3);
    color: #ffffff;
    box-shadow: 0 0 20px rgba(120, 0, 200, 0.1);
  }

  .dl-btn {
    width: 100%;
    padding: 14px 20px;
    background: linear-gradient(135deg, #7c3aed 0%, #6b21a8 50%, #581c87 100%);
    background-size: 200% auto;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.86rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    text-align: left;
    transition: all 0.3s ease;
    letter-spacing: -0.01em;
    position: relative;
    overflow: hidden;
  }

  .dl-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    background-size: 200% 100%;
    animation: shimmer 3s ease-in-out infinite;
    pointer-events: none;
  }

  .dl-btn:hover {
    background-position: right center;
    transform: translateY(-2px);
    box-shadow:
      0 6px 24px rgba(120, 0, 200, 0.25),
      0 0 40px rgba(120, 0, 200, 0.1);
  }

  .dl-btn:active { transform: translateY(0); }
</style>
</head>
<body>
<div class="card">
  <div class="card-glow top-left"></div>
  <div class="card-glow bottom-right"></div>
  <h1>Manager Assignment <span class="accent">Processor</span></h1>
  <p class="subtitle">Drop a Changes_[Date].xlsx file to generate the Catch assignment file.</p>

  <div id="drop-zone">
    <input type="file" id="file-input" accept=".xlsx">
    <div class="drop-icon">📂</div>
    <div class="drop-label">Drop Changes file here</div>
    <div class="drop-hint">or click to browse &nbsp;·&nbsp; .xlsx only</div>
  </div>

  <div id="status-area">
    <div id="status-msg" class="status-msg"></div>
  </div>

  <div id="error-panel">
    <h3>⛔ Validation Failed — Fix these rows before re-uploading</h3>
    <ul id="error-list"></ul>
  </div>

  <div id="results-panel">
    <div id="result-catch" class="result-row" style="display:none">
      <span class="label">Catch (361966)</span>
      <span class="count" id="count-catch">0</span>
    </div>
    <div id="result-skipped" class="result-row skipped" style="display:none">
      <span class="label">Skipped (unknown company codes)</span>
      <span class="count" id="count-skipped">0</span>
    </div>
    <button id="btn-catch" class="dl-btn" style="display:none">⬇ Download Catch file</button>
  </div>

  <button id="reset-btn" onclick="resetUI()">Process Another File</button>
</div>

// A=0  B=1  C=2  D=3  E=4  F=5  G=6  H=7  I=8  J=9
// K=10 L=11 M=12 N=13 O=14 P=15 Q=16 R=17 S=18
const SRC = { co:4, id:10, recordType:11, supervisorCo:15, supervisor:12, reviewerCo:16, reviewer:13, costCenter1:17, costCenter2:18, payGroup:14, deptDesc:3, dept:7 };

// ── Output template column indices (0-based) ─────────────────────────────────
// A=0 B=1 C=2  AU=46 AV=47  AX=49 AY=50 AZ=51 BA=52  BJ=61
const DST = { co:0, id:1, recordType:2, supervisorCo:46, supervisor:47, reviewerCo:49, reviewer:50, costCenter1:51, costCenter2:52, payGroup:61 };

// ── Validation ───────────────────────────────────────────────────────────────
const FLAGGED_DEPTS = ["andvaris", "medix", "nulogic", "people share"];

// ── UI helpers ───────────────────────────────────────────────────────────────
function showStatus(msg, type) {
  const area = document.getElementById("status-area");
  const el   = document.getElementById("status-msg");
  area.style.display = "block";
  el.className = "status-msg status-" + type;
  el.textContent = msg;
}

function showErrorPanel(errors) {
  const panel = document.getElementById("error-panel");
  const list  = document.getElementById("error-list");
  list.innerHTML = "";
  errors.forEach(e => {
    const li = document.createElement("li");
    li.textContent = e;
    list.appendChild(li);
  });
  panel.style.display = "block";
}

function resetUI() {
  document.getElementById("status-area").style.display   = "none";
  document.getElementById("error-panel").style.display   = "none";
  document.getElementById("results-panel").style.display = "none";
  document.getElementById("reset-btn").style.display     = "none";
  document.getElementById("result-catch").style.display  = "none";
  document.getElementById("result-skipped").style.display = "none";
  document.getElementById("btn-catch").style.display     = "none";
  document.getElementById("file-input").value            = "";
}

// ── Date extraction from filename ────────────────────────────────────────────
function extractDate(filename) {
  const m = filename.match(/(\d{2}-\d{2}-\d{4})/);
  if (m) return m[1];
  // Fallback: today
  const t = new Date();
  const mm = String(t.getMonth()+1).padStart(2,"0");
  const dd = String(t.getDate()).padStart(2,"0");
  const yy = t.getFullYear();
  return `${mm}-${dd}-${yy}`;
}

// ── Build output rows for one company ────────────────────────────────────────
function buildOutputRows(dataRows) {
  return dataRows.map(row => {
    const out = new Array(501).fill("");
    out[DST.co]           = row[SRC.co]          ?? "";
    out[DST.id]           = row[SRC.id]          ?? "";
    out[DST.recordType]   = row[SRC.recordType]  ?? "";
    out[DST.supervisorCo] = row[SRC.supervisorCo]?? "";
    out[DST.supervisor]   = row[SRC.supervisor]  ?? "";
    out[DST.reviewerCo]   = row[SRC.reviewerCo]  ?? "";
    out[DST.reviewer]     = row[SRC.reviewer]    ?? "";
    out[DST.costCenter1]  = row[SRC.costCenter1] ?? "";
    out[DST.costCenter2]  = row[SRC.costCenter2] ?? "";
    out[DST.payGroup]     = row[SRC.payGroup]    ?? "";
    return out;
  });
}

// ── Download helper ───────────────────────────────────────────────────────────
function downloadWorkbook(outputRows, filename) {
  const aoa = [TEMPLATE_HEADERS, ...outputRows];
  const ws  = XLSX.utils.aoa_to_sheet(aoa);
  const wb  = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
  const buf  = XLSX.write(wb, { bookType: "xlsx", type: "array" });
  const blob = new Blob([buf], { type: "application/octet-stream" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// ── Main processing ───────────────────────────────────────────────────────────
function processFile(file) {
  if (!file.name.toLowerCase().endsWith(".xlsx")) {
    showStatus("Please drop an .xlsx file.", "warning");
    return;
  }

  showStatus("Reading file…", "processing");

  const reader = new FileReader();
  reader.onerror = () => showStatus("Error reading file.", "warning");
  reader.onload  = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb   = XLSX.read(data, { type: "array", raw: false });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

      if (rows.length < 2) {
        showStatus("No data rows found in the file.", "warning");
        document.getElementById("reset-btn").style.display = "block";
        return;
      }

      const dataRows = rows.slice(1); // skip header row

      // ── Blocking validation ──────────────────────────────────────────────
      const errors = [];
      for (let i = 0; i < dataRows.length; i++) {
        const deptDesc = String(dataRows[i][SRC.deptDesc]).trim();
        const dept     = String(dataRows[i][SRC.dept]).trim();
        if (FLAGGED_DEPTS.includes(deptDesc.toLowerCase()) &&
            deptDesc.toLowerCase() !== dept.toLowerCase()) {
          errors.push(`Row ${i+2}: Department Description="${deptDesc}" but Department="${dept}"`);
        }
      }
      if (errors.length > 0) {
        showStatus(`Validation failed — ${errors.length} row(s) must be corrected before processing.`, "warning");
        showErrorPanel(errors);
        document.getElementById("reset-btn").style.display = "block";
        return;
      }

      // ── Split by company code ────────────────────────────────────────────
      const catchRows   = [];
      const skippedRows = [];
      const unknownCodes = new Set();

      dataRows.forEach(row => {
        const code = String(row[SRC.co]).trim();
        if (code === "361966") catchRows.push(row);
        else { skippedRows.push(row); unknownCodes.add(code || "(blank)"); }
      });

      if (catchRows.length === 0) {
        showStatus("No rows matched company code 361966.", "warning");
        document.getElementById("reset-btn").style.display = "block";
        return;
      }

      // ── Build output rows (no download yet) ─────────────────────────────
      const dateStr = extractDate(file.name);
      const catchOutputRows = buildOutputRows(catchRows);

      // ── Results summary ──────────────────────────────────────────────────
      const panel = document.getElementById("results-panel");
      panel.style.display = "block";

      document.getElementById("count-catch").textContent = catchRows.length;
      document.getElementById("result-catch").style.display = "flex";
      const btnCatch = document.getElementById("btn-catch");
      btnCatch.textContent = `⬇ Catch_Manager Assignments_${dateStr}.xlsx`;
      btnCatch.onclick = () => downloadWorkbook(catchOutputRows, `Catch_Manager Assignments_${dateStr}.xlsx`);
      btnCatch.style.display = "block";

      if (skippedRows.length > 0) {
        document.getElementById("count-skipped").textContent = skippedRows.length;
        document.getElementById("result-skipped").title = "Codes: " + [...unknownCodes].join(", ");
        document.getElementById("result-skipped").style.display = "flex";
      }

      showStatus(`Done! Click the button below to download: Catch_Manager Assignments_${dateStr}.xlsx`, "success");
      document.getElementById("reset-btn").style.display = "block";

    } catch (err) {
      showStatus("Failed to process file: " + err.message, "warning");
      document.getElementById("reset-btn").style.display = "block";
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── Drag-and-drop wiring ──────────────────────────────────────────────────────
const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("file-input");

dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
dropZone.addEventListener("dragleave", ()  => { dropZone.classList.remove("dragover"); });
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});
fileInput.addEventListener("change", () => {
  if (fileInput.files[0]) processFile(fileInput.files[0]);
});
</script>
